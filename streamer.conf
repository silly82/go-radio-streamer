# Streamer configuration
# Multicast address and port for RTP/AES67 streaming and SAP announcements
multicast_address=239.69.250.171:5004

# PTP reference clock (optional).
# Set this to the IEEE 1588-2008 grandmaster clock ID of your external PTP
# clock source, e.g.:
#   ptp_ref_clock=IEEE1588-2008:AA-BB-CC-DD-EE-FF-00-00:0
#
# When left empty (the default), the local MAC address of this machine is used
# as the reference clock ("localmac=…").  This is the correct setting when no
# external PTP grandmaster clock is present on the network and avoids
# synchronisation failures with AES67 apps and hardware receivers.
#ptp_ref_clock=
